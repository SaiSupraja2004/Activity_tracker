<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Motivation Activity Tracker</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.2/dist/confetti.browser.min.js"></script>

</head>

<body>

<div class="container">

    <header>

        <h1>🚀 Motivation Activity Tracker</h1>

        <div class="quote-box">
            <h3 id="quoteText">
                Discipline beats motivation.
            </h3>
        </div>

    </header>

    <!-- Dashboard -->

    <div class="dashboard">

        <div class="card">
            <h3>🔥 Current Streak</h3>
            <p id="streak">0 Days</p>
        </div>

        <div class="card">
            <h3>🏆 Completion Rate</h3>
            <p id="completionRate">0%</p>
        </div>

        <div class="card">
            <h3>📈 Best Activity</h3>
            <p id="bestActivity">-</p>
        </div>

    </div>

    <!-- Progress -->

    <section class="overall-progress">

        <div class="section-header">

            <h2>Overall Progress</h2>

            <span id="overallPercent">
                0%
            </span>

        </div>

        <div class="progress-bar">
            <div id="overallBar"></div>
        </div>

    </section>

    <!-- Achievements -->

    <section class="achievements">

        <h2>🏅 Achievements</h2>

        <div id="badges" class="badge-container">

            <span class="badge locked">
                🥉 First Tick
            </span>

            <span class="badge locked">
                🥈 7 Day Streak
            </span>

            <span class="badge locked">
                🥇 30 Day Streak
            </span>

            <span class="badge locked">
                👑 90% Completion
            </span>

        </div>

    </section>

    <!-- Heatmap -->

    <section class="heatmap-section">

        <h2>📅 Activity Heatmap</h2>

        <div id="heatmap">

        </div>

    </section>

    <!-- Tracker Table -->

    <section class="table-section">

        <div class="table-wrapper">

            <table id="trackerTable">

            </table>

        </div>

    </section>

</div>

<!-- Floating Action Button -->

<button id="fab" class="fab">

    +

</button>

<div id="fabMenu" class="fab-menu">

    <button onclick="addActivity()">

        ➕ Add Activity

    </button>

    <button onclick="addDate()">

        📅 Add Date

    </button>

</div>

<!-- Context Menu -->

<div id="contextMenu" class="context-menu">

</div>

<!-- Feedback Modal -->

<div id="feedbackModal" class="modal">

    <div class="modal-content">

        <h2>💬 Feedback</h2>

        <textarea
            id="feedbackInput"
            placeholder="Write your feedback here..."
        ></textarea>

        <div class="modal-buttons">

            <button id="saveFeedback">

                Save

            </button>

            <button onclick="closeFeedbackModal()">

                Cancel

            </button>

        </div>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
